---
- name: Deploy RunCalc Pro Container
  hosts: web
  become: true

  tasks:

    - name: Ensure Docker is installed
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull latest Docker image
      command: docker pull uwschriss/runcalc-pro:latest

    - name: Stop existing container
      command: docker stop runcalc
      ignore_errors: yes

    - name: Remove existing container
      command: docker rm runcalc
      ignore_errors: yes

    - name: Run new container
      command: docker run -d -p 80:80 --name runcalc uwschriss/runcalc-pro:latest